<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Issues Tracker</title>
  <link rel="icon" href="assets/github-logo.png" />
  <link rel="stylesheet" href="main.css" />
</head>
<body>
  
  <header class="navbar">
    <div class="nav-brand">
      <img src="assets/github-logo.png" alt="GitHub logo" />
      <span>GitHub Issues Tracker</span>
    </div>

    <div class="nav-right">
      <div class="search-box">
        <span class="search-icon" id="search-btn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="#656d76"><path d="M11.5 7a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Zm-.82 4.74a6 6 0 1 1 1.06-1.06l3.04 3.04a.75.75 0 1 1-1.06 1.06l-3.04-3.04Z"/></svg>
        </span>
        <input type="text" id="search-input" placeholder="Search issues..." />
      </div>
      <button id="new-btn" class="new-issue">+ New Issue</button>
      <button id="logout-btn" class="logout">Logout</button>
    </div>
  </header>

  <main class="container">
  

    <nav class="tabs">
      <button class="tab active" data-tab="all">All</button>
      <button class="tab" data-tab="open">Open</button>
      <button class="tab" data-tab="closed">Closed</button>
    </nav>

  
    <div class="summary">
      <div class="summary-left">
        <img src="assets/Aperture.png" alt="" />
        <span id="summary-text">Loading issues...</span>
      </div>
      <div class="summary-right">
        <span class="marker open"><img src="assets/Open-Status.png" alt="" /> <b id="open-count">0</b> Open</span>
        <span class="marker closed"><img src="assets/Closed- Status .png" alt="" /> <b id="closed-count">0</b> Closed</span>
      </div>
    </div>

    
    <div id="spinner" class="spinner hidden"><div class="loader"></div></div>

    
    <section id="issues" class="grid"></section>

    
    <p id="empty" class="empty hidden">No issues found.</p>
  </main>

  
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button id="modal-close" class="modal-close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  
  <div id="new-modal" class="modal hidden">
    <div class="modal-content">
      <button id="new-close" class="modal-close">&times;</button>
      <h2 class="form-title">Create New Issue</h2>
      <form id="new-form" class="new-form">
        <label for="f-title">Title</label>
        <input type="text" id="f-title" placeholder="Issue title" required />

        <label for="f-desc">Description</label>
        <textarea id="f-desc" rows="3" placeholder="Describe the issue" required></textarea>

        <div class="form-row">
          <div>
            <label for="f-status">Status</label>
            <select id="f-status">
              <option value="open">Open</option>
              <option value="closed">Closed</option>
            </select>
          </div>
          <div>
            <label for="f-priority">Priority</label>
            <select id="f-priority">
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
        </div>

        <label for="f-author">Author</label>
        <input type="text" id="f-author" placeholder="your_username" required />

        <label for="f-labels">Labels (comma separated)</label>
        <input type="text" id="f-labels" placeholder="bug, enhancement" />

        <button type="submit" class="submit-btn">Create Issue</button>
      </form>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="main.js"></script>
</body>
</html>
